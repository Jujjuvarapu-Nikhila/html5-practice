<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>List Tags</title>
        <style>
            ol,ul{
                background-color: gray;
                font-family: calibri,sans-serif;
            }
            li{
                background-color: lightgray;
                margin: 5px;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <ul>
            <li>Angular JS</li>
            <li>React JS</li>
            <li>Vue JS</li>
            <li>Ember JS</li>
        </ul>
        
        <ol>
            <li>Angular JS</li>
            <li>React JS</li>
            <li>Vue JS</li>
            <li>Ember JS</li>
        </ol>
    </body>
</html>
